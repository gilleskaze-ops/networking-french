<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
<style>
  :root {
    --bg: #f9f7f4;
    --surface: #ffffff;
    --border: #e5e2db;
    --text: #1a1917;
    --text-muted: #7a7672;
    --text-faint: #b0ada8;
    --accent: #2563eb;
    --accent-soft: #eff4ff;
    --drop-bg: #f0f4ff;
    --drop-border: #2563eb;
    --code-bg: #f3f2ef;
    --sidebar-w: 260px;
    --font-sans: 'Georgia', 'Times New Roman', serif;
    --font-ui: system-ui, -apple-system, sans-serif;
    --font-mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1d1b;
      --border: #2e2d2a;
      --text: #e8e5df;
      --text-muted: #8a877f;
      --text-faint: #4a4845;
      --accent: #60a5fa;
      --accent-soft: #1a2540;
      --code-bg: #252420;
      --drop-bg: #1a2035;
      --drop-border: #60a5fa;
    }
    #hljs-light { display: none; }
    #hljs-dark { display: block !important; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #sidebar-header svg { opacity: .6; flex-shrink: 0; }
  #sidebar-header span {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  #file-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text-muted);
    border-left: 3px solid transparent;
    transition: all .15s;
    user-select: none;
  }
  .file-item:hover { background: var(--bg); color: var(--text); }
  .file-item.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .file-item .file-icon { font-size: 14px; flex-shrink: 0; }
  .file-item .file-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .file-item .file-remove {
    opacity: 0;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    font-size: 12px;
    transition: opacity .1s;
    flex-shrink: 0;
  }
  .file-item:hover .file-remove { opacity: .5; }
  .file-item .file-remove:hover { opacity: 1; background: var(--border); }
  #sidebar-empty {
    padding: 24px 16px;
    font-size: 12.5px;
    color: var(--text-faint);
    line-height: 1.6;
    text-align: center;
  }
  #add-file-btn {
    margin: 8px 12px 12px;
    padding: 8px 12px;
    border: 1px dashed var(--border);
    border-radius: 7px;
    background: none;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font-ui);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all .15s;
  }
  #add-file-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  #file-input { display: none; }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  #toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 46px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #doc-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #doc-title.empty { color: var(--text-faint); font-weight: 400; }
  .toolbar-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12.5px;
    font-family: var(--font-ui);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all .15s;
    white-space: nowrap;
  }
  .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
  #word-count { font-size: 12px; color: var(--text-faint); }

  /* ── DROP ZONE ── */
  #drop-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: default;
    padding: 40px;
    transition: background .15s;
  }
  #drop-zone.drag-over {
    background: var(--drop-bg);
  }
  #drop-zone .drop-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  #drop-zone.drag-over .drop-icon {
    border-color: var(--drop-border);
    background: var(--drop-bg);
    transform: scale(1.05);
  }
  #drop-zone .drop-label {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
  }
  #drop-zone .drop-sub {
    font-size: 13px;
    color: var(--text-faint);
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
  }
  #drop-zone .drop-btn {
    padding: 9px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 13.5px;
    font-family: var(--font-ui);
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  #drop-zone .drop-btn:hover { opacity: .88; }
  #drop-zone.drag-over .drop-label { color: var(--accent); }

  /* ── CONTENT SCROLL ── */
  #content-scroll {
    flex: 1;
    overflow-y: auto;
    display: none;
  }
  #content-scroll.visible { display: block; }
  #content-wrap {
    max-width: 740px;
    margin: 0 auto;
    padding: 48px 36px 80px;
    transition: padding-right .25s ease;
  }

  /* ── MARKDOWN RENDERING ── */
  #md-output {
    font-family: var(--font-sans);
    font-size: 17px;
    line-height: 1.8;
    color: var(--text);
  }
  #md-output h1, #md-output h2, #md-output h3,
  #md-output h4, #md-output h5, #md-output h6 {
    font-family: var(--font-ui);
    font-weight: 700;
    line-height: 1.3;
    margin-top: 2em;
    margin-bottom: .6em;
    color: var(--text);
  }
  #md-output h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin-top: 0; }
  #md-output h2 { font-size: 1.45em; border-bottom: 1px solid var(--border); padding-bottom: .25em; }
  #md-output h3 { font-size: 1.2em; }
  #md-output h4 { font-size: 1.05em; }
  #md-output h5, #md-output h6 { font-size: .95em; color: var(--text-muted); }
  #md-output p { margin: 0 0 1em; }
  #md-output a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  #md-output a:hover { opacity: .75; }
  #md-output ul, #md-output ol { margin: 0 0 1em 1.6em; }
  #md-output li { margin-bottom: .3em; }
  #md-output li > ul, #md-output li > ol { margin-top: .3em; margin-bottom: 0; }
  #md-output blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 0 6px 18px;
    margin: 0 0 1em;
    color: var(--text-muted);
    font-style: italic;
  }
  #md-output blockquote > p { margin: 0; }
  #md-output code {
    font-family: var(--font-mono);
    font-size: .85em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text);
  }
  #md-output pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    overflow-x: auto;
    margin: 0 0 1.2em;
    position: relative;
  }
  #md-output pre code {
    background: none;
    padding: 0;
    font-size: .875em;
    border-radius: 0;
    line-height: 1.6;
  }
  #md-output table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 1.2em;
    font-size: .93em;
    font-family: var(--font-ui);
  }
  #md-output th {
    background: var(--code-bg);
    font-weight: 600;
    text-align: left;
    padding: 8px 12px;
    border: 1px solid var(--border);
    font-size: .875em;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  #md-output td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  #md-output tr:nth-child(even) td { background: var(--bg); }
  #md-output img {
    max-width: 100%;
    border-radius: 6px;
    margin: .5em 0;
  }
  #md-output hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2em 0;
  }
  #md-output input[type="checkbox"] { margin-right: 6px; }
  #md-output .task-list-item { list-style: none; margin-left: -1.2em; }

  /* ── SCROLLBAR ── */
  #content-scroll::-webkit-scrollbar { width: 6px; }
  #content-scroll::-webkit-scrollbar-track { background: transparent; }
  #content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── TOC PANEL ── */
  #toc-panel {
    position: fixed;
    right: 0; top: 0;
    width: 230px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px 14px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform .25s ease;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #toc-panel.open { transform: translateX(0); }
  #toc-panel h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-faint);
    margin-bottom: 10px;
    font-family: var(--font-ui);
  }
  .toc-item {
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    line-height: 1.4;
    transition: all .1s;
    font-family: var(--font-ui);
  }
  .toc-item:hover { background: var(--bg); color: var(--text); }
  .toc-h1 { font-weight: 600; }
  .toc-h2 { padding-left: 14px; }
  .toc-h3 { padding-left: 26px; font-size: 12px; }
  .toc-h4, .toc-h5, .toc-h6 { padding-left: 36px; font-size: 12px; color: var(--text-faint); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div id="sidebar-header">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
      <path d="M5 6h6M5 9h6M5 12h4" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
    </svg>
    <span>Fichiers</span>
  </div>
  <div id="file-list">
    <div id="sidebar-empty">Glisse des fichiers .md<br>pour commencer</div>
  </div>
  <button id="add-file-btn" onclick="document.getElementById('file-input').click()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M6.5 2v9M2 6.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Ajouter des fichiers
  </button>
  <input type="file" id="file-input" accept=".md,.markdown,.txt" multiple>
</aside>

<!-- MAIN -->
<main id="main">
  <div id="toolbar">
    <span id="doc-title" class="empty">Aucun fichier ouvert</span>
    <span id="word-count"></span>
    <button class="toolbar-btn" id="toc-btn" onclick="toggleToc()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M1 3h11M1 6.5h7M1 10h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Table des matières
    </button>
  </div>

  <!-- DROP ZONE -->
  <div id="drop-zone">
    <div class="drop-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M14 5v14M8 13l6-8 6 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
        <path d="M4 22h20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity=".3"/>
      </svg>
    </div>
    <div class="drop-label">Dépose tes fichiers Markdown ici</div>
    <div class="drop-sub">Supporte .md, .markdown, .txt — plusieurs fichiers à la fois</div>
    <button class="drop-btn" onclick="document.getElementById('file-input').click()">Parcourir les fichiers</button>
  </div>

  <!-- CONTENT -->
  <div id="content-scroll">
    <div id="content-wrap">
      <div id="md-output"></div>
    </div>
  </div>
</main>

<!-- TOC PANEL -->
<div id="toc-panel">
  <h4>Table des matières</h4>
  <div id="toc-content"></div>
</div>

<script>
// ── State ──
const files = [];
let activeIdx = -1;
let tocOpen = false;

// ── marked config ──
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

// ── File loading ──
function loadFiles(fileList) {
  Array.from(fileList).forEach(file => {
    if (!file.name.match(/\.(md|markdown|txt)$/i)) return;
    const reader = new FileReader();
    reader.onload = e => {
      files.push({ name: file.name, content: e.target.result });
      renderSidebar();
      if (files.length === 1) openFile(0);
    };
    reader.readAsText(file);
  });
}

function openFile(idx) {
  activeIdx = idx;
  renderSidebar();
  const { name, content } = files[idx];
  document.getElementById('doc-title').textContent = name;
  document.getElementById('doc-title').classList.remove('empty');

  const html = marked.parse(content);
  const output = document.getElementById('md-output');
  output.innerHTML = html;

  // Syntax highlight
  output.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

  // Task list checkboxes
  output.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.disabled = false);

  // Word / read time
  const words = content.trim().split(/\s+/).filter(Boolean).length;
  const mins = Math.max(1, Math.round(words / 200));
  document.getElementById('word-count').textContent = `${words.toLocaleString()} mots · ~${mins} min`;

  // Show content
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('content-scroll').classList.add('visible');

  // Build TOC
  buildToc();
  document.getElementById('toc-btn').style.display = '';

  // Scroll to top
  document.getElementById('content-scroll').scrollTop = 0;
}

function removeFile(idx, e) {
  e.stopPropagation();
  files.splice(idx, 1);
  if (activeIdx >= files.length) activeIdx = files.length - 1;
  renderSidebar();
  if (files.length === 0) {
    activeIdx = -1;
    document.getElementById('drop-zone').style.display = '';
    document.getElementById('content-scroll').classList.remove('visible');
    document.getElementById('doc-title').textContent = 'Aucun fichier ouvert';
    document.getElementById('doc-title').classList.add('empty');
    document.getElementById('word-count').textContent = '';
    document.getElementById('toc-btn').style.display = 'none';
    if (tocOpen) toggleToc();
  } else if (activeIdx >= 0) {
    openFile(activeIdx);
  }
}

function renderSidebar() {
  const list = document.getElementById('file-list');
  const empty = document.getElementById('sidebar-empty');
  if (files.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    return;
  }
  const items = files.map((f, i) => {
    const active = i === activeIdx ? ' active' : '';
    return `<div class="file-item${active}" onclick="openFile(${i})">
      <span class="file-icon">📄</span>
      <span class="file-name" title="${f.name}">${f.name}</span>
      <span class="file-remove" onclick="removeFile(${i}, event)" title="Retirer">✕</span>
    </div>`;
  }).join('');
  list.innerHTML = items;
}

// ── TOC ──
function buildToc() {
  const headings = document.querySelectorAll('#md-output h1,h2,h3,h4,h5,h6');
  const toc = document.getElementById('toc-content');
  if (headings.length < 2) {
    toc.innerHTML = '<div style="font-size:12px;color:var(--text-faint)">Aucun titre trouvé</div>';
    return;
  }
  toc.innerHTML = Array.from(headings).map((h, i) => {
    const level = h.tagName.toLowerCase();
    h.id = `heading-${i}`;
    return `<div class="toc-item toc-${level}" onclick="scrollToHeading('heading-${i}')">${h.textContent}</div>`;
  }).join('');
}

function scrollToHeading(id) {
  const el = document.getElementById(id);
  if (el) {
    document.getElementById('content-scroll').scrollTo({
      top: el.offsetTop - 24,
      behavior: 'smooth'
    });
  }
}

function toggleToc() {
  tocOpen = !tocOpen;
  document.getElementById('toc-panel').classList.toggle('open', tocOpen);
  document.getElementById('content-wrap').style.paddingRight = tocOpen ? '260px' : '36px';
}

// ── Drag & drop on full window ──
const dropZone = document.getElementById('drop-zone');

document.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
document.addEventListener('dragleave', e => {
  if (!e.relatedTarget || e.relatedTarget === document.documentElement) {
    dropZone.classList.remove('drag-over');
  }
});
document.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadFiles(e.dataTransfer.files);
});

// ── File input ──
document.getElementById('file-input').addEventListener('change', e => {
  loadFiles(e.target.files);
  e.target.value = '';
});

// ── Keyboard shortcut Ctrl+W to close current ──
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'w' && activeIdx >= 0) {
    e.preventDefault();
    removeFile(activeIdx, { stopPropagation: () => {} });
  }
});
</script>
</body>
</html>
